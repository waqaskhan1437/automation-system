name: "Setup runner Node workspace"
description: "Setup Node.js and install runner-scripts dependencies. Call actions/checkout before this local action."
inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "20"
runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: runner-scripts/package-lock.json

    - name: Install runner-scripts dependencies
      shell: bash
      run: |
        set -euo pipefail
        cd runner-scripts
        npm_install() {
          timeout 300s npm ci --prefer-offline --no-audit --fund=false --fetch-timeout=60000 --fetch-retries=2
        }
        npm_install || {
          echo "npm ci failed or timed out; retrying once with online cache refresh"
          timeout 300s npm ci --no-audit --fund=false --fetch-timeout=60000 --fetch-retries=2
        }

name: Deploy Production

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - 'worker/**'
      - 'local-runner/**'
      - 'runner-scripts/**'
      - 'vercel.json'
      - 'frontend/vercel.json'
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-handoff:
    name: Validate code and hand off deploys
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node for Worker
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'worker/package-lock.json'

      - name: Check Worker
        shell: bash
        run: |
          set -euo pipefail
          cd worker
          npm ci
          npm run check

      - name: Setup Node for Frontend
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Build Frontend
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build

      - name: Deployment handoff summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ### Deploy Production summary

          | Stage | Result |
          |---|---|
          | Worker TypeScript check | success |
          | Frontend production build | success |
          | Cloudflare Worker deploy | handled by Cloudflare Git integration |
          | Vercel frontend deploy | handled by Vercel Git integration |

          This workflow intentionally does not run `wrangler deploy` or `vercel deploy`.
          The repository is already connected directly to Cloudflare and Vercel, so GitHub Actions only validates the code and lets those providers deploy from the pushed commit. This prevents duplicate deploys, invalid CLI-token failures, and skipped dependent deploy jobs.
          SUMMARY

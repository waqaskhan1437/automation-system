name: "Video Automation Runner"
run-name: "Video job ${{ inputs.job_id }} ${{ inputs.dispatch_nonce }}"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      dispatch_nonce:
        description: 'Unique dispatch nonce used by the worker to correlate this exact GitHub run'
        required: false
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      runtime_config_token:
        description: 'Short-lived token for fetching runtime config from worker'
        required: false
        type: string
      runner_labels:
        description: 'JSON array of runner labels'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  process-video:
    runs-on: ${{ fromJson(github.event.inputs.runner_labels || '["ubuntu-latest"]') }}
    timeout-minutes: 60

    env:
      WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
      JOB_ID: ${{ github.event.inputs.job_id }}
      AUTOMATION_ID: ${{ github.event.inputs.automation_id }}
      RUNNER_EXECUTION_MODE: github
      RUNTIME_CONFIG_TOKEN: ${{ github.event.inputs.runtime_config_token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup runner Node workspace
        uses: ./.github/actions/setup-runner-node

      - name: Prepare debug output
        run: |
          mkdir -p runner-scripts/output
          {
            echo "run_id=${{ github.run_id }}"
            echo "job_id=${{ github.event.inputs.job_id }}"
            echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > runner-scripts/output/workflow-start.txt

      - name: Save config
        run: node runner-scripts/fetch-runtime-config.js

      - name: Install yt-dlp
        timeout-minutes: 4
        run: |
          set -euo pipefail
          mkdir -p runner-scripts/output
          python3 -m pip install -q "yt-dlp[default]" --upgrade --break-system-packages --timeout 60 --retries 2
          yt-dlp --version | tee runner-scripts/output/yt-dlp-version.txt

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('runner-scripts/package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Verify FFmpeg without apt install
        timeout-minutes: 3
        run: |
          set -euo pipefail
          mkdir -p runner-scripts/output .github-tools/bin

          log() {
            echo "[TOOLS] $*" | tee -a runner-scripts/output/setup-tools.log
          }

          export PATH="$PWD/.github-tools/bin:$PATH"

          if command -v ffmpeg >/dev/null 2>&1 && command -v ffprobe >/dev/null 2>&1; then
            log "Using preinstalled FFmpeg: $(command -v ffmpeg)"
          else
            log "FFmpeg not found; downloading static FFmpeg binary without apt-get."
            ARCH="$(uname -m)"
            if [ "$ARCH" != "x86_64" ] && [ "$ARCH" != "amd64" ]; then
              log "Unsupported architecture for static FFmpeg bootstrap: $ARCH"
              exit 1
            fi

            TMP_DIR="$(mktemp -d)"
            cleanup() { rm -rf "$TMP_DIR"; }
            trap cleanup EXIT

            if ! timeout 90s curl -fsSL --connect-timeout 15 --retry 1 --retry-delay 3 \
              "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" \
              -o "$TMP_DIR/ffmpeg-static.tar.xz"; then
              log "Static FFmpeg download failed or timed out. Failing fast instead of hanging on apt-get."
              exit 1
            fi

            timeout 30s tar -xJf "$TMP_DIR/ffmpeg-static.tar.xz" -C "$TMP_DIR"
            FFMPEG_DIR="$(find "$TMP_DIR" -maxdepth 1 -type d -name 'ffmpeg-*-amd64-static' | head -n 1)"
            test -n "$FFMPEG_DIR"
            cp "$FFMPEG_DIR/ffmpeg" "$FFMPEG_DIR/ffprobe" .github-tools/bin/
            chmod +x .github-tools/bin/ffmpeg .github-tools/bin/ffprobe
            echo "$PWD/.github-tools/bin" >> "$GITHUB_PATH"
            log "Static FFmpeg installed to repo-local tools directory."
          fi

          command -v ffmpeg | tee -a runner-scripts/output/setup-tools.log
          command -v ffprobe | tee -a runner-scripts/output/setup-tools.log
          ffmpeg -version | head -1 | tee runner-scripts/output/ffmpeg-version.txt

          node - <<'NODE' | tee -a runner-scripts/output/setup-tools.log
          const fs = require('fs');
          const candidates = [
            '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',
            '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf',
            '/usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf',
            '/usr/share/fonts/truetype/lato/Lato-Bold.ttf',
            '/usr/share/fonts/truetype/noto/NotoSans-Bold.ttf'
          ];
          const found = candidates.find((file) => fs.existsSync(file));
          console.log(found ? `Font available: ${found}` : 'No preferred font file found; process-video will use FFmpeg Sans fallback.');
          NODE

      - name: Install Playwright Chromium fast
        timeout-minutes: 8
        run: |
          set -euo pipefail
          mkdir -p runner-scripts/output
          cd runner-scripts

          log() {
            echo "[PLAYWRIGHT] $*" | tee -a output/setup-tools.log
          }

          BROWSER_PATH="$(node -e 'const { chromium } = require("playwright-core"); console.log(chromium.executablePath())')"
          if [ ! -x "$BROWSER_PATH" ]; then
            log "Chromium not found in cache, installing browser only first."
            if ! timeout 240s npx --no-install playwright-core install chromium; then
              log "Browser-only install failed or timed out; trying dependency install fallback."
              timeout 300s npx --no-install playwright-core install --with-deps chromium
            fi
          else
            log "Chromium restored from cache: $BROWSER_PATH"
          fi

          BROWSER_PATH="$(node -e 'const { chromium } = require("playwright-core"); console.log(chromium.executablePath())')"
          test -x "$BROWSER_PATH"
          echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$BROWSER_PATH" >> "$GITHUB_ENV"
          node - <<'NODE'
          const { chromium } = require('playwright-core');
          (async () => {
            const executablePath = process.env.PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH || chromium.executablePath();
            const browser = await chromium.launch({ executablePath, headless: true, args: ['--no-sandbox', '--disable-dev-shm-usage'] });
            const page = await browser.newPage();
            await page.setContent('<html><body>ok</body></html>');
            await browser.close();
            console.log(`Chromium smoke test OK: ${executablePath}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Download and Process Videos
        timeout-minutes: 30
        run: |
          cd runner-scripts
          mkdir -p output
          
          VIDEOS_PER_RUN=$(node -e "console.log(require('./automation-config.json').videos_per_run || 1)")
          TOTAL_URLS=$(node -e "console.log(require('./automation-config.json').video_urls?.length || 0)")
          
          echo "=============================================="
          echo "Videos per run: $VIDEOS_PER_RUN"
          echo "Total URLs: $TOTAL_URLS"
          echo "=============================================="
          
          set +e
          node main.js 2>&1 | tee output/runner.log
          MAIN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$MAIN_EXIT_CODE" -ne 0 ]; then
            echo "main.js exited with code $MAIN_EXIT_CODE"
            {
              echo "=== runner.log tail ==="
              tail -n 300 output/runner.log 2>/dev/null || true
              echo "=== error.log ==="
              cat output/error.log 2>/dev/null || true
            } | tee -a output/error.log
          fi

          echo "=============================================="
          echo "=== INTRO DIAGNOSTICS ==="
          grep -n "\[INTRO\]" output/runner.log 2>/dev/null || echo "No [INTRO] lines found in runner.log"
          echo "=== intro_metadata.json ==="
          cat output/intro_metadata.json 2>/dev/null || echo "intro_metadata.json not found"
          echo "=== output files ==="
          ls -la output/ 2>/dev/null || echo "No output"
          echo "=============================================="

          exit "$MAIN_EXIT_CODE"

      - name: Update Status on Failure
        if: failure()
        timeout-minutes: 2
        run: |
          cd runner-scripts
          if [ -f output/error.log ]; then
            echo "=== Error Log ==="
            cat output/error.log
          fi
          node update-job-status.js || true

      - name: Upload artifacts
        if: always()
        uses: ./.github/actions/upload-runner-artifacts
        with:
          name: job-debug-${{ github.event.inputs.job_id }}
          path: runner-scripts/output/

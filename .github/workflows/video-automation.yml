name: "Video Automation Runner"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      automation_config:
        description: 'Full automation config as JSON'
        required: true
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      postforme_api_key:
        description: 'PostForMe API key'
        required: false
        type: string

permissions:
  contents: write

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp and FFmpeg
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup directories
        run: mkdir -p runner-scripts/output videos

      - name: Download Video
        env:
          CONFIG: ${{ github.event.inputs.automation_config }}
        run: |
          echo "$CONFIG" > runner-scripts/automation-config.json
          cd runner-scripts
          npm ci
          node download-video.js

      - name: Process Video
        run: |
          cd runner-scripts
          node process-video.js
          ls -la output/

      - name: Upload video to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          VIDEO_FILE=$(find runner-scripts/output -name "*.mp4" | head -1)
          if [ -z "$VIDEO_FILE" ]; then
            echo "ERROR: No video file found"
            exit 1
          fi
          echo "Found: $VIDEO_FILE ($(du -h "$VIDEO_FILE" | cut -f1))"

          VIDEO_NAME="video-job-${JOB_ID}.mp4"
          cp "$VIDEO_FILE" "$VIDEO_NAME"

          # Create or get the 'video-outputs' release for storing videos
          RELEASE_TAG="video-outputs"
          EXISTING=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" | grep '"id"' | head -1 | grep -o '[0-9]*')

          if [ -z "$EXISTING" ]; then
            echo "Creating release..."
            curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/releases" \
              -d "{\"tag_name\":\"$RELEASE_TAG\",\"name\":\"Video Outputs\",\"body\":\"Auto-generated videos from automation\",\"draft\":false,\"prerelease\":false}" > /dev/null

            # Need to create the tag first
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag -f "$RELEASE_TAG"
            git push origin "$RELEASE_TAG" -f

            sleep 2
            EXISTING=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" | grep '"id"' | head -1 | grep -o '[0-9]*')
          fi

          echo "Release ID: $EXISTING"

          # Delete old asset with same name if exists
          OLD_ASSET=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$EXISTING/assets" | \
            grep -B2 "\"name\": \"$VIDEO_NAME\"" | grep '"id"' | grep -o '[0-9]*')
          if [ -n "$OLD_ASSET" ]; then
            echo "Deleting old asset $OLD_ASSET..."
            curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$OLD_ASSET"
          fi

          # Upload video as release asset
          echo "Uploading $VIDEO_NAME..."
          UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/releases/$EXISTING/assets?name=$VIDEO_NAME"
          RESPONSE=$(curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: video/mp4" \
            --data-binary @"$VIDEO_NAME" "$UPLOAD_URL")

          DOWNLOAD_URL=$(echo "$RESPONSE" | grep '"browser_download_url"' | head -1 | cut -d'"' -f4)

          if [ -n "$DOWNLOAD_URL" ]; then
            echo "Upload SUCCESS: $DOWNLOAD_URL"
            echo "RAW_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          else
            echo "Upload failed, response: $RESPONSE"
            exit 1
          fi

      - name: Update Job Status
        if: always()
        env:
          WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          VIDEO_URL: ${{ env.RAW_URL || '' }}
          JOB_STATUS: ${{ job.status }}
        run: |
          cd runner-scripts
          node update-job-status.js

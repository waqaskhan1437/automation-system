name: "Video Automation Runner"
run-name: "Video job ${{ inputs.job_id }} ${{ inputs.dispatch_nonce }}"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      dispatch_nonce:
        description: 'Unique dispatch nonce used by the worker to correlate this exact GitHub run'
        required: false
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      runtime_config_token:
        description: 'Short-lived token for fetching runtime config from worker'
        required: false
        type: string
      runner_labels:
        description: 'JSON array of runner labels'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  process-video:
    runs-on: ${{ fromJson(github.event.inputs.runner_labels || '["ubuntu-latest"]') }}
    timeout-minutes: 60

    env:
      WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
      JOB_ID: ${{ github.event.inputs.job_id }}
      AUTOMATION_ID: ${{ github.event.inputs.automation_id }}
      RUNNER_EXECUTION_MODE: github
      RUNTIME_CONFIG_TOKEN: ${{ github.event.inputs.runtime_config_token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup runner Node workspace
        uses: ./.github/actions/setup-runner-node

      - name: Save config
        run: node runner-scripts/fetch-runtime-config.js

      - name: Install & update yt-dlp (latest)
        timeout-minutes: 8
        run: |
          set -euo pipefail
          # Upgrade yt-dlp to latest version every run (critical for YouTube 2026 compatibility)
          python3 -m pip install -q "yt-dlp[default]" --upgrade --break-system-packages
          YT_VERSION="$(yt-dlp --version 2>&1)"
          echo "yt-dlp version: $YT_VERSION"
          # Verify extractors are functional
          yt-dlp --list-extractors 2>&1 | grep -qi youtube || { echo "FATAL: YouTube extractor missing in yt-dlp $YT_VERSION"; exit 1; }
          # Check JS runtime support (required for n-challenge solving)
          if yt-dlp --help 2>&1 | grep -q "js-runtimes"; then
            echo "js-runtimes: available"
          else
            echo "FATAL: yt-dlp $YT_VERSION does not support --js-runtimes (required for YouTube 2026)"; exit 1
          fi
          # Check remote-components support (required for EJS solver scripts)
          if yt-dlp --help 2>&1 | grep -q "remote-components"; then
            echo "remote-components: available"
          else
            echo "FATAL: yt-dlp $YT_VERSION does not support --remote-components (required for EJS)"; exit 1
          fi
          # Check that node is available (yt-dlp's JS runtime)
          which node && echo "Node.js: $(node --version)" || { echo "FATAL: node not found (required for JS runtime)"; exit 1; }
          # Check that pip's yt-dlp-ejs package is available (offline EJS solver)
          python3 -c "import yt_dlp_ejs" 2>/dev/null && echo "yt-dlp-ejs: installed (offline)" || echo "yt-dlp-ejs: not bundled (will use --remote-components instead)"
          # Pre-download EJS (Encrypted JavaScript Solver) components for YouTube n-challenge
          # This must be done BEFORE the actual download so components are cached locally.
          echo "Pre-downloading EJS components for YouTube n-challenge solving..."
          yt-dlp --remote-components ejs:github -v 2>&1 || { echo "FATAL: EJS pre-download failed — YouTube downloads will fail without it"; exit 1; }
          echo "EJS pre-download: SUCCESS"
          echo ""

      - name: Install FFmpeg and fonts
        timeout-minutes: 8
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            ffmpeg \
            fonts-dejavu-core \
            fonts-ubuntu \
            python3
          fc-cache -f -v >/dev/null 2>&1 || true
          ffmpeg -version | head -1

      - name: Install Playwright Chromium
        timeout-minutes: 12
        run: |
          set -euo pipefail
          cd runner-scripts
          npx --no-install playwright-core install --with-deps chromium
          BROWSER_PATH="$(node -e 'const { chromium } = require("playwright-core"); console.log(chromium.executablePath())')"
          test -x "$BROWSER_PATH"
          echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$BROWSER_PATH" >> "$GITHUB_ENV"
          node - <<'NODE'
          const { chromium } = require('playwright-core');
          (async () => {
            const executablePath = process.env.PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH || chromium.executablePath();
            const browser = await chromium.launch({ executablePath, headless: true, args: ['--no-sandbox', '--disable-dev-shm-usage'] });
            const page = await browser.newPage();
            await page.setContent('<html><body>ok</body></html>');
            await browser.close();
            console.log(`Chromium smoke test OK: ${executablePath}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Download and Process Videos
        timeout-minutes: 30
        run: |
          cd runner-scripts
          mkdir -p output
          
          VIDEOS_PER_RUN=$(node -e "console.log(require('./automation-config.json').videos_per_run || 1)")
          TOTAL_URLS=$(node -e "console.log(require('./automation-config.json').video_urls?.length || 0)")
          
          echo "=============================================="
          echo "Videos per run: $VIDEOS_PER_RUN"
          echo "Total URLs: $TOTAL_URLS"
          echo "=============================================="
          
          set +e
          node main.js 2>&1 | tee output/runner.log
          MAIN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$MAIN_EXIT_CODE" -ne 0 ]; then
            echo "main.js exited with code $MAIN_EXIT_CODE"
            {
              echo "=== runner.log tail ==="
              tail -n 300 output/runner.log 2>/dev/null || true
              echo "=== error.log ==="
              cat output/error.log 2>/dev/null || true
            } | tee -a output/error.log
          fi

          echo "=============================================="
          ls -la output/ 2>/dev/null || echo "No output"
          echo "=============================================="

          exit "$MAIN_EXIT_CODE"

      - name: Update Status on Failure
        if: failure()
        timeout-minutes: 2
        run: |
          cd runner-scripts
          if [ -f output/error.log ]; then
            echo "=== Error Log ==="
            cat output/error.log
          fi
          node update-job-status.js || true

      - name: Upload artifacts
        if: always()
        uses: ./.github/actions/upload-runner-artifacts
        with:
          name: job-debug-${{ github.event.inputs.job_id }}
          path: runner-scripts/output/

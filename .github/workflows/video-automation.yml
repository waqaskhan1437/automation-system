name: "Video Automation Runner"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      automation_config:
        description: 'Full automation config as JSON (with pre-fetched video_urls)'
        required: true
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      runtime_config_token:
        description: 'Short-lived token for fetching runtime config from worker'
        required: false
        type: string
      runner_labels:
        description: 'JSON array of runner labels'
        required: false
        type: string
      postforme_api_key:
        description: 'PostForMe API key'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  process-video:
    runs-on: ${{ fromJson(github.event.inputs.runner_labels || '["ubuntu-latest"]') }}
    timeout-minutes: 60

    env:
      CONFIG: ${{ github.event.inputs.automation_config }}
      WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
      JOB_ID: ${{ github.event.inputs.job_id }}
      AUTOMATION_ID: ${{ github.event.inputs.automation_id }}
      RUNTIME_CONFIG_TOKEN: ${{ github.event.inputs.runtime_config_token }}
      POSTFORME_API_KEY: ${{ github.event.inputs.postforme_api_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup runner Node workspace
        uses: ./.github/actions/setup-runner-node

      - name: Save config
        run: node runner-scripts/fetch-runtime-config.js

      - name: Install yt-dlp
        run: |
          pip install -q "yt-dlp[default]" --upgrade --break-system-packages
          yt-dlp --version

      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-ubuntu fonts-dejavu-core python3
          sudo apt-get install -y chromium || sudo apt-get install -y chromium-browser
          BROWSER_PATH=$(command -v chromium || command -v chromium-browser || command -v google-chrome || command -v google-chrome-stable)
          echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$BROWSER_PATH" >> $GITHUB_ENV
          fc-cache -f -v
          ffmpeg -version | head -1

      - name: Download and Process Videos
        timeout-minutes: 30
        run: |
          cd runner-scripts
          mkdir -p output
          
          VIDEOS_PER_RUN=$(node -e "console.log(require('./automation-config.json').videos_per_run || 1)")
          TOTAL_URLS=$(node -e "console.log(require('./automation-config.json').video_urls?.length || 0)")
          
          echo "=============================================="
          echo "Videos per run: $VIDEOS_PER_RUN"
          echo "Total URLs: $TOTAL_URLS"
          echo "=============================================="
          
          set +e
          node main.js
          MAIN_EXIT=$?
          set -e
          if [ "$MAIN_EXIT" -ne 0 ]; then
            echo "main.js exited with code $MAIN_EXIT"
            cat output/error.log 2>/dev/null || true
            cat output/failure-report.json 2>/dev/null || true
          fi
          
          echo "=============================================="
          ls -la output/ 2>/dev/null || echo "No output"
          echo "=============================================="
          exit "$MAIN_EXIT"

      - name: Update Status on Failure
        if: failure()
        run: |
          cd runner-scripts
          if [ -f output/error.log ]; then
            echo "=== Error Log ==="
            cat output/error.log
          fi
          node update-job-status.js || true

      - name: Upload artifacts
        if: always()
        uses: ./.github/actions/upload-runner-artifacts
        with:
          name: job-debug-${{ github.event.inputs.job_id }}
          path: runner-scripts/

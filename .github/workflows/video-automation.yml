name: "Video Automation Runner"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      automation_config:
        description: 'Full automation config as JSON'
        required: true
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      postforme_api_key:
        description: 'PostForMe API key'
        required: false
        type: string

permissions:
  contents: write

jobs:
  process-video:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp and FFmpeg
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup directories
        run: mkdir -p runner-scripts/output videos

      - name: Download Video
        env:
          CONFIG: ${{ github.event.inputs.automation_config }}
        run: |
          echo "$CONFIG" > runner-scripts/automation-config.json
          cd runner-scripts
          npm ci
          node download-video.js

      - name: Process Video
        run: |
          cd runner-scripts
          node process-video.js
          ls -la output/

      - name: Upload video to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          VIDEO_FILE=$(find runner-scripts/output -name "*.mp4" | head -1)
          if [ -z "$VIDEO_FILE" ]; then
            echo "ERROR: No video file found"
            exit 1
          fi
          echo "Found: $VIDEO_FILE"
          
          VIDEO_NAME="video-job-${JOB_ID}.mp4"
          cp "$VIDEO_FILE" "$VIDEO_NAME"
          
          # Create videos directory if needed and commit
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "$VIDEO_NAME"
          git commit -m "Add video for job $JOB_ID" || echo "Already exists"
          git push origin master
          
          echo "RAW_URL=https://raw.githubusercontent.com/${{ github.repository }}/master/$VIDEO_NAME" >> $GITHUB_ENV

      - name: Update Job Status
        if: always()
        env:
          WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          VIDEO_URL: ${{ env.RAW_URL || '' }}
        run: |
          cd runner-scripts
          node update-job-status.js

name: "Video Automation Template"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: number
      video_source:
        description: 'Video source type: direct|youtube|bunny'
        required: true
      video_url:
        description: 'Video URL or ID'
        required: true
      ffmpeg_config:
        description: 'FFmpeg config JSON'
        required: true
      platforms:
        description: 'Target platforms JSON'
        required: true

jobs:
  process:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: runner-scripts

      - name: Download Video
        env:
          VIDEO_SOURCE: ${{ github.event.inputs.video_source }}
          VIDEO_URL: ${{ github.event.inputs.video_url }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_LIBRARY_ID: ${{ secrets.BUNNY_LIBRARY_ID }}
        run: node download-video.js
        working-directory: runner-scripts

      - name: Process Video (FFmpeg)
        env:
          FFMPEG_CONFIG: ${{ github.event.inputs.ffmpeg_config }}
        run: node process-video.js
        working-directory: runner-scripts

      - name: Post to Social Media
        env:
          POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
          WORKER_WEBHOOK_URL: ${{ secrets.WORKER_WEBHOOK_URL }}
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: node post-via-postforme.js
        working-directory: runner-scripts

      - name: Update Job Status
        if: always()
        env:
          WORKER_WEBHOOK_URL: ${{ secrets.WORKER_WEBHOOK_URL }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          JOB_STATUS: ${{ job.status }}
        run: node update-job-status.js
        working-directory: runner-scripts

name: "Video Automation Runner"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      automation_config:
        description: 'Full automation config as JSON'
        required: true
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      postforme_api_key:
        description: 'PostForMe API key'
        required: false
        type: string
      video_source:
        description: 'Video source'
        required: false
        type: string
        default: "youtube"
      video_url:
        description: 'Video URL'
        required: false
        type: string
        default: ""
      channel_url:
        description: 'Channel URL'
        required: false
        type: string
        default: ""
      multiple_urls:
        description: 'Multiple URLs'
        required: false
        type: string
        default: "[]"
      videos_per_run:
        description: 'Videos per run'
        required: false
        type: string
        default: "1"
      short_duration:
        description: 'Short duration'
        required: false
        type: string
        default: "60"
      playback_speed:
        description: 'Playback speed'
        required: false
        type: string
        default: "1.0"
      aspect_ratio:
        description: 'Aspect ratio'
        required: false
        type: string
        default: "9:16"
      crop_mode:
        description: 'Crop mode'
        required: false
        type: string
        default: "crop"
      split_enabled:
        description: 'Split enabled'
        required: false
        type: string
        default: "false"
      combine_enabled:
        description: 'Combine enabled'
        required: false
        type: string
        default: "false"
      codec:
        description: 'Codec'
        required: false
        type: string
        default: "libx264"
      output_format:
        description: 'Output format'
        required: false
        type: string
        default: "mp4"
      output_quality:
        description: 'Output quality'
        required: false
        type: string
        default: "high"
      output_resolution:
        description: 'Output resolution'
        required: false
        type: string
        default: "1080x1920"
      auto_publish:
        description: 'Auto publish'
        required: false
        type: string
        default: "true"
      platforms:
        description: 'Platforms'
        required: false
        type: string
        default: "[]"
      top_tagline:
        description: 'Top tagline'
        required: false
        type: string
        default: ""
      bottom_tagline:
        description: 'Bottom tagline'
        required: false
        type: string
        default: ""

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install runner dependencies
        run: npm ci && mkdir -p output
        working-directory: runner-scripts

      - name: Download Video
        run: |
          echo '${{ github.event.inputs.automation_config }}' > automation-config.json
          node download-video.js
        working-directory: runner-scripts

      - name: Process Video
        continue-on-error: true
        run: |
          echo "=== DEBUG ==="
          ls -la output/ 2>&1 || echo "No output dir"
          cat automation-config.json 2>&1 || echo "No config"
          echo "=== END DEBUG ==="
          node runner-scripts/process-video.js
        working-directory: runner-scripts

      - name: Post to Social Media
        if: github.event.inputs.postforme_api_key != ''
        continue-on-error: true
        env:
          POSTFORME_API_KEY: ${{ github.event.inputs.postforme_api_key }}
        run: |
          node runner-scripts/post-via-postforme.js || true
          if [ -f output/post_result.json ]; then
            echo "POSTFORME_OUTPUT=$(cat output/post_result.json)" >> $GITHUB_ENV
          fi
        working-directory: runner-scripts

      - name: Upload processed video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-video-${{ github.event.inputs.job_id }}
          path: runner-scripts/output/
          retention-days: 7
          if-no-files-found: warn

      - name: Update Job Status
        if: always()
        continue-on-error: true
        env:
          WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "WORKER_WEBHOOK_URL=$WORKER_WEBHOOK_URL"
          echo "JOB_ID=$JOB_ID"
          echo "JOB_STATUS=$JOB_STATUS"
          node runner-scripts/update-job-status.js
        working-directory: runner-scripts

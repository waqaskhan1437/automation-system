name: "Video Automation Runner"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      automation_config:
        description: 'Full automation config as JSON'
        required: true
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      postforme_api_key:
        description: 'PostForMe API key'
        required: false
        type: string

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install runner dependencies
        run: npm ci && mkdir -p output videos
        working-directory: runner-scripts

      - name: Download Video
        run: |
          echo '${{ github.event.inputs.automation_config }}' > automation-config.json
          node download-video.js
        working-directory: runner-scripts

      - name: Process Video
        continue-on-error: true
        run: |
          node runner-scripts/process-video.js
        working-directory: runner-scripts

      - name: Find processed video
        id: find-video
        run: |
          # Find the processed video file
          VIDEO_FILE=""
          if [ -f "runner-scripts/output/processed-video.mp4" ]; then
            VIDEO_FILE="runner-scripts/output/processed-video.mp4"
          elif [ -f "runner-scripts/output/final.mp4" ]; then
            VIDEO_FILE="runner-scripts/output/final.mp4"
          elif [ -f "runner-scripts/output/video.mp4" ]; then
            VIDEO_FILE="runner-scripts/output/video.mp4"
          fi
          
          if [ -n "$VIDEO_FILE" ]; then
            echo "Found video: $VIDEO_FILE"
            echo "VIDEO_FILE=$VIDEO_FILE" >> $GITHUB_ENV
            echo "VIDEO_SIZE=$(stat -c%s "$VIDEO_FILE")" >> $GITHUB_ENV
          else
            echo "No video file found!"
            ls -la runner-scripts/output/ 2>/dev/null || echo "Output dir not found"
            exit 1
          fi

      - name: Upload video to GitHub
        if: success()
        id: upload-video
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JOB_ID=${{ github.event.inputs.job_id }}
          VIDEO_PATH="videos/job-$JOB_ID.mp4"
          
          # Copy video to repo root with proper name
          cp "$VIDEO_FILE" "$VIDEO_PATH"
          
          # Create commit
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Add file
          git add "$VIDEO_PATH"
          git commit -m "Add processed video for job $JOB_ID" || echo "Nothing to commit"
          git push origin master || echo "Push failed - file may already exist"
          
          # Get raw URL
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/master/$VIDEO_PATH"
          echo "RAW_URL=$RAW_URL" >> $GITHUB_ENV
          echo "VIDEO_PATH=$VIDEO_PATH" >> $GITHUB_ENV
          echo "::set-output name=raw_url::$RAW_URL"
          echo "::set-output name=video_path::$VIDEO_PATH"

      - name: Update Job Status with Video URL
        if: always()
        continue-on-error: true
        env:
          WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          VIDEO_URL: ${{ env.RAW_URL || '' }}
        run: |
          node runner-scripts/update-job-status.js
        working-directory: runner-scripts

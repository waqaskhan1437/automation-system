name: "Video Automation Runner"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      automation_config:
        description: 'Full automation config as JSON'
        required: true
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string
      postforme_api_key:
        description: 'PostForMe API key'
        required: false
        type: string

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install runner dependencies
        run: npm ci && mkdir -p output
        working-directory: runner-scripts

      - name: Save config file
        run: echo '${{ github.event.inputs.automation_config }}' > automation-config.json

      - name: Download Video
        env:
          VIDEO_SOURCE: ${{ fromJson(github.event.inputs.automation_config).video_source || 'youtube' }}
          VIDEO_URL: ${{ fromJson(github.event.inputs.automation_config).video_url || '' }}
          YOUTUBE_CHANNEL_URL: ${{ fromJson(github.event.inputs.automation_config).youtube_channel_url || '' }}
          MANUAL_LINKS: ${{ fromJson(github.event.inputs.automation_config).manual_links || '' }}
        run: |
          echo "VIDEO_SOURCE=$VIDEO_SOURCE"
          echo "VIDEO_URL=$VIDEO_URL"
          echo "YOUTUBE_CHANNEL_URL=$YOUTUBE_CHANNEL_URL"
          echo "MANUAL_LINKS=$MANUAL_LINKS"
          node runner-scripts/download-video.js
        working-directory: runner-scripts

      - name: Process Video
        run: node runner-scripts/process-video.js
        working-directory: runner-scripts

      - name: Post to Social Media
        if: github.event.inputs.postforme_api_key != ''
        continue-on-error: true
        run: node runner-scripts/post-via-postforme.js
        working-directory: runner-scripts

      - name: Upload processed video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-video-${{ github.event.inputs.job_id }}
          path: runner-scripts/output/
          retention-days: 7
          if-no-files-found: warn

      - name: Update Job Status
        if: always()
        run: node runner-scripts/update-job-status.js
        working-directory: runner-scripts

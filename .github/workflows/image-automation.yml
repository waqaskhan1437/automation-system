name: "Image to Short Automation"
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID from worker'
        required: true
        type: string
      automation_id:
        description: 'Automation ID'
        required: true
        type: string
      image_url:
        description: 'Direct image URL'
        required: false
        type: string
      google_photos_url:
        description: 'Google Photos URL'
        required: false
        type: string
      video_duration:
        description: 'Short duration in seconds'
        required: false
        default: '10'
        type: string
      aspect_ratio:
        description: 'Aspect ratio (9:16, 16:9, 1:1)'
        required: false
        default: '9:16'
        type: string
      animation:
        description: 'Animation type (zoom, pan, kenburns, static)'
        required: false
        default: 'zoom'
        type: string
      top_tagline:
        description: 'Top tagline text'
        required: false
        type: string
      bottom_tagline:
        description: 'Bottom tagline text'
        required: false
        type: string
      auto_publish:
        description: 'Auto publish to social media'
        required: false
        default: 'false'
        type: string
      platforms:
        description: 'Target platforms (JSON array)'
        required: false
        default: '[]'
        type: string
      postforme_api_key:
        description: 'Postforme API key'
        required: false
        type: string
      worker_webhook_url:
        description: 'Worker webhook URL'
        required: false
        type: string

jobs:
  process-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install runner dependencies
        run: npm ci
        working-directory: runner-scripts

      - name: Create output directory
        run: mkdir -p output

      - name: Convert Image to Short
        env:
          IMAGE_URL: ${{ github.event.inputs.image_url }}
          GOOGLE_PHOTOS_URL: ${{ github.event.inputs.google_photos_url }}
          VIDEO_DURATION: ${{ github.event.inputs.video_duration }}
          ASPECT_RATIO: ${{ github.event.inputs.aspect_ratio }}
          ANIMATION: ${{ github.event.inputs.animation }}
          TOP_TAGLINE: ${{ github.event.inputs.top_tagline }}
          BOTTOM_TAGLINE: ${{ github.event.inputs.bottom_tagline }}
        run: node image-to-short.js
        working-directory: runner-scripts

      - name: Post to Social Media
        if: github.event.inputs.auto_publish == 'true'
        env:
          POSTFORME_API_KEY: ${{ github.event.inputs.postforme_api_key }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
          MEDIA_FILE: ../output/processed-video.mp4
          WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: node post-via-postforme.js
        working-directory: runner-scripts

      - name: Upload short as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-short-${{ github.event.inputs.job_id }}
          path: runner-scripts/output/
          retention-days: 7

      - name: Update Job Status - Success
        if: success()
        env:
          WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          JOB_STATUS: success
        run: node update-job-status.js
        working-directory: runner-scripts

      - name: Update Job Status - Failed
        if: failure()
        env:
          WORKER_WEBHOOK_URL: ${{ github.event.inputs.worker_webhook_url }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          JOB_STATUS: failed
        run: node update-job-status.js
        working-directory: runner-scripts

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude AI - Free Terminal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 20px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.2rem; }
    .model-select {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
      overflow-y: auto;
    }
    .message {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .user {
      background: #2563eb;
      align-self: flex-end;
    }
    .assistant {
      background: #1a1a1a;
      border: 1px solid #333;
    }
    .input-area {
      padding: 20px;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    .input-area input:focus { border-color: #2563eb; }
    .input-area button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading { opacity: 0.5; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Claude AI - Free via Puter.js</h1>
    <select class="model-select" id="model">
      <option value="claude-sonnet-4.5">Claude Sonnet 4.5</option>
      <option value="claude-haiku-4.5">Claude Haiku (Fast)</option>
      <option value="claude-opus-4.5">Claude Opus (Powerful)</option>
      <option value="claude-sonnet-4.6">Claude Sonnet 4.6</option>
    </select>
  </div>
  
  <div class="chat" id="chat"></div>
  
  <div class="input-area">
    <input type="text" id="input" placeholder="Ask Claude anything..." autofocus>
    <button id="send">Send</button>
  </div>

  <script src="https://js.puter.com/v2/"></script>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const modelSelect = document.getElementById('model');

    async function addMessage(content, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function askClaude() {
      const message = input.value.trim();
      if (!message) return;
      
      addMessage(message, true);
      input.value = '';
      sendBtn.disabled = true;
      
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message assistant loading';
      loadingDiv.textContent = '🤖 Thinking...';
      chat.appendChild(loadingDiv);
      
      try {
        const response = await puter.ai.chat(message, {
          model: modelSelect.value
        });
        
        chat.removeChild(loadingDiv);
        addMessage(response, false);
      } catch (error) {
        chat.removeChild(loadingDiv);
        addMessage('❌ Error: ' + error.message, false);
      }
      
      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', askClaude);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') askClaude();
    });

    addMessage('👋 Hello! Ask me anything. I\'m Claude AI, free via Puter.js!', false);
  </script>
</body>
</html>

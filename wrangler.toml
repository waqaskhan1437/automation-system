# Fallback Cloudflare config for repo-root Workers Builds.
# Keep this aligned with worker/wrangler.toml.
name = "automation-api"
main = "worker/src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm ci"
cwd = "worker"
watch_dir = "worker"

[[d1_databases]]
binding = "DB"
database_name = "automation-db"
database_id = "d1a88132-78e9-4fab-9855-4cd554f7febc"

[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://frontend-nine-jet-27.vercel.app"

[triggers]
crons = ["* * * * *"]
